<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Weibull Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-graph-up-arrow fs-2 text-accent mb-2 d-block"></i>
            <h1 class="h4 fw-semibold">NA Analysis</h1>
            <p class="text-secondary small">Войдите чтобы сохранять расчёты</p>
        </div>

        <!-- Вкладки Вход / Регистрация -->
        <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
            <li class="nav-item">
                <button class="nav-link active" id="loginTab" onclick="showTab('login')">
                    Вход
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="registerTab" onclick="showTab('register')">
                    Регистрация
                </button>
            </li>
        </ul>

        <!-- Форма входа -->
        <div id="loginForm">
            <div class="mb-3">
                <label class="form-label small text-secondary">Email</label>
                <input type="email" id="loginEmail" class="form-control app-input" placeholder="your@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label small text-secondary">Пароль</label>
                <input type="password" id="loginPassword" class="form-control app-input" placeholder="••••••••">
            </div>
            <button onclick="login()" class="btn btn-accent w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
        </div>

        <!-- Форма регистрации -->
        <div id="registerForm" class="d-none">
            <div class="mb-3">
                <label class="form-label small text-secondary">Email</label>
                <input type="email" id="registerEmail" class="form-control app-input" placeholder="your@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label small text-secondary">Пароль</label>
                <input type="password" id="registerPassword" class="form-control app-input"
                    placeholder="Минимум 6 символов">
            </div>
            <button onclick="register()" class="btn btn-accent w-100 mb-3">
                <i class="bi bi-person-plus me-2"></i>Зарегистрироваться
            </button>
        </div>

        <!-- Статус -->
        <div id="authStatus" class="text-center small font-mono mt-2"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
